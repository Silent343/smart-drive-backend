# ============================================================================
#  SmartDrive Finance Platform - Application configuration
# ============================================================================
spring.application.name=SmartDrive Finance Platform

# The Angular frontend targets http://localhost:3000 (see environment.ts), so
# the API is served on port 3000 with root-level paths (no /api/v1 prefix).
server.port=${PORT:8080}

# ---------------------------------------------------------------------------
#  Datasource: H2 in-memory by default for local development.
#  Production uses the dedicated `supabase` profile and PostgreSQL.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:smartdrive;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.hibernate.naming.physical-strategy=pe.edu.upc.smartdrive.platform.shared.infrastructure.persistence.jpa.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# OpenAPI documentation metadata (taken from pom.xml at build time)
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT configuration
authorization.jwt.secret=${JWT_SECRET:smartdrive-local-jwt-secret-change-me}
authorization.jwt.expiration.days=7

# TOTP configuration
totp.issuer=SmartDrive

# ---------------------------------------------------------------------------
#  Advisor (AI) ? Gemini configuration
#  Get a free key at https://aistudio.google.com/apikey and export it as
#  GEMINI_API_KEY. Without a key, the advisor returns a friendly notice.
# ---------------------------------------------------------------------------
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
gemini.base-url=https://generativelanguage.googleapis.com/v1beta

# ---------------------------------------------------------------------------
#  PII encryption at rest (AES-GCM). Provide a Base64 16/24/32-byte key.
#  Generate one with:  openssl rand -base64 32
#  In production, set APP_CRYPTO_AES_KEY as an environment variable.
# ---------------------------------------------------------------------------
app.crypto.aes-key=${APP_CRYPTO_AES_KEY:c21hcnRkcml2ZS1kZXYtYWVzLWtleS0zMmJ5dGVzISE=}

# ---------------------------------------------------------------------------
#  CORS: comma-separated allowed origins. Set CORS_ORIGIN in the hosting
#  provider (e.g. Render) to your frontend URL, e.g.
#  CORS_ORIGIN=https://smart-drive-frontend-beryl.vercel.app
#  Multiple origins allowed: CORS_ORIGIN=https://a.vercel.app,http://localhost:4200
# ---------------------------------------------------------------------------
cors.allowed-origins=${CORS_ORIGIN:http://localhost:4200,http://localhost:3000}
