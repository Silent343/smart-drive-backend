# ============================================================================
# SmartDrive Finance - Supabase/PostgreSQL production profile
# ============================================================================
# Activate with: SPRING_PROFILES_ACTIVE=supabase
#
# Use the JDBC version of the Supabase connection string. For a persistent
# Spring backend, Supabase recommends the direct connection when IPv6 is
# available, or the Session Pooler on port 5432 for IPv4-only hosts.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MS:5000}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# `update` bootstraps an empty Supabase project. Change to `validate` after
# the first successful deployment and manage future schema changes as SQL.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=false

# Production secrets must be provided by the hosting provider.
authorization.jwt.secret=${JWT_SECRET}
authorization.jwt.expiration.days=${JWT_EXPIRATION_DAYS:7}
app.crypto.aes-key=${APP_CRYPTO_AES_KEY}
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# Comma-separated frontend origins, for example:
# https://smartdrive.example.com,https://www.smartdrive.example.com
cors.allowed-origins=${CORS_ORIGIN}
